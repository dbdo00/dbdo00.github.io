<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Content Updater</title>
    <script src="https://unpkg.com/netlify-auth-providers"></script>
</head>

<body>
    <h1>GitHub Content Updater</h1>
    <button id='loginButton'>Login to GitHub</button>
    <div id="repoExplorer" style="display: none;">
        <h2>Repository Explorer</h2>
        <label for="repoName">Repository Name:</label>
        <input type="text" id="repoName" placeholder="Enter repository name">
        <button id="repocontentbutton">Explore Repository</button>
        <div id="fileExplorer" style="display: none;">
            <h3>Repository Contents</h3>
            <select id="filePath">
                <option value="">Create New File</option>
                <!-- File paths will be populated dynamically -->
            </select>
        </div>
        <div>
            <label for="content">Content:</label>
            <textarea id="content" rows="5" cols="50" placeholder="Enter content"></textarea>
        </div>
        <div id="message"></div>
        <button id="update">Update/Create Content</button>
    </div>
    <script src="./index.js"></script>

    <script type="module">
        import { Octokit, App } from "https://esm.sh/octokit";
        let octokit;
        let contentChanged = false;
        let autosaveTimer;

        async function login() {
            // restore the file path from local storage
            const savedFilePath = localStorage.getItem('filePath');
            // restore the file path from local storage


            // const token = prompt('Enter your GitHub token:');
            if (token) {
                octokit = new Octokit({
                    auth: token
                });
                document.getElementById('repoExplorer').style.display = 'block';
            } else {
                alert('Token is required for login.');
            }

            displaySavedOptions();
            // restore the file path from local storage
            if (savedFilePath) {
                document.getElementById('filePath').value = savedFilePath;
                displayFileContent();
            }
        }

        function encode64(text) {
            return btoa(String.fromCharCode(...new TextEncoder().encode(text)))
        }

        function decode64(text) {
            return new TextDecoder().decode(Uint8Array.from(atob(text), (c) => c.charCodeAt(0)))
        }

        // document.getElementById('loginButton').addEventListener('click', login); 
        document.getElementById('repocontentbutton').addEventListener('click', getMarkdownFilesInFolder);

        function displayFileExplorer(markdownFiles) {
            const filePathSelect = document.getElementById('filePath');
            filePathSelect.innerHTML = ''; // Clear existing options

            markdownFiles.forEach(file => {
                const option = document.createElement('option');
                option.value = file.path;
                option.textContent = file.name;
                filePathSelect.appendChild(option);
            });



            const fileExplorer = document.getElementById('fileExplorer');
            fileExplorer.style.display = 'block';
        }


        async function displaySavedOptions() {
            const savedFiles = localStorage.getItem('filePaths');
            const savedRepoName = localStorage.getItem('repoName');
            if (savedFiles) {
                const markdownFiles = JSON.parse(savedFiles);
                displayFileExplorer(markdownFiles);
            }
        }


        async function getMarkdownFilesInFolder(folderPath) {
            /* Get the contents of the specified folder in the repository */

            const repoName = document.getElementById('repoName').value.trim();

            // save repoName to local storage
            localStorage.setItem('repoName', repoName);

            try {
                // Get the authenticated user's username
                const { data: user } = await octokit.request('GET /user');
                const owner = user.login; // Username of the logged-in user

                const response = await octokit.request('GET /repos/{owner}/{repo}/contents/markdown', {
                    owner: owner, // Use the username of the logged-in user
                    repo: repoName,
                    path: folderPath, // Specify the path to the folder
                    headers: {
                        'X-GitHub-Api-Version': '2022-11-28'
                    }
                });

                const markdownFiles = response.data.filter(item => {
                    return item.type === 'file' && (item.name.endsWith('.md') || item.name.endsWith('.org'));
                });

                const fileExplorer = document.getElementById('fileExplorer');
                const filePathSelect = document.getElementById('filePath');
                filePathSelect.innerHTML = ''; // Clear existing options

                if (markdownFiles.length === 0) {
                    alert(`No Markdown or Org files found in folder "${folderPath}"`);
                    return;
                }

                markdownFiles.forEach(file => {
                    const option = document.createElement('option');
                    option.value = file.path;
                    option.textContent = file.name;
                    filePathSelect.appendChild(option);
                });

                /* save the options to the local storage */
                localStorage.setItem('filePaths', JSON.stringify(markdownFiles));

                fileExplorer.style.display = 'block';
            } catch (error) {
                alert('An error occurred while fetching repository contents. Please check the repository name and folder path.');
                console.error(error);
            }
        }

        const computeSha = async (filePath) => {
            if (filePath) {
                const { data: user } = await octokit.request('GET /user');
                const owner = user.login; // Username of the logged-in user

                const repoName = document.getElementById('repoName').value.trim() || localStorage.getItem('repoName');
                // Get the existing file's SHA
                const { data: existingFile } = await octokit.request('GET /repos/{owner}/{repo}/contents/{path}', {
                    owner,
                    repo: repoName,
                    path: filePath,
                    headers: {
                        'X-GitHub-Api-Version': '2022-11-28'
                    }
                });
                return existingFile.sha;
            }
        }


        async function displayFileContent() {
            const selectedFile = decodeURIComponent(
                document.getElementById('filePath').value
            );
            localStorage.setItem('filePath', selectedFile);
            const { data: user } = await octokit.request('GET /user');
            const repoName = document.getElementById('repoName').value.trim() || localStorage.getItem('repoName');
            const owner = user.login; // Username of the logged-in user
            try {
                const fileContent = await octokit.request('GET /repos/{owner}/{repo}/contents/{path}', {
                    owner: owner,
                    repo: repoName,
                    path: selectedFile,
                    headers: {
                        'X-GitHub-Api-Version': '2022-11-28'
                    }
                });
                console.log(fileContent);
                // Decode the base64 content
                const decodedContent = decode64(fileContent.data.content);

                // Display the content in textarea
                document.getElementById('content').value = decodedContent;
            } catch (error) {
                alert('An error occurred while fetching file content.');
                console.error(error);
            }
        }

        // Event delegation for option clicks
        document.getElementById('filePath').addEventListener('change', displayFileContent);

        const showMessageBox = (message) => {
            document.querySelector('#message').textContent = message;
            setTimeout(() => {
                document.querySelector('#message').textContent = '';
            }, 3000);
        };

        async function updateOrCreateContent() {
            const repoName = document.getElementById('repoName').value.trim() || localStorage.getItem('repoName');
            const filePath = document.getElementById('filePath').value.trim() || localStorage.getItem('filePath');
            const content = encode64(document.getElementById('content').value.trim()); // Base64 encoding content
            const { data: user } = await octokit.request('GET /user');
            const owner = user.login; // Username of the logged-in user

            const message = 'Update/Create contnt ' + filePath;
            const committer = {
                name: user.login,
                email: 'dbdowjfb@outlook.jp'
            };

            const sha = await computeSha(filePath);


            try {
                if (filePath) {

                    // Update existing file
                    await octokit.request('PUT /repos/{owner}/{repo}/contents/{path}', {
                        owner,
                        repo: repoName,
                        path: filePath,
                        message,
                        committer,
                        content,
                        sha,
                        headers: {
                            'X-GitHub-Api-Version': '2022-11-28'
                        }
                    });

                    document.querySelector('#message').textContent = 'File updated successfully!';
                    setTimeout(() => {
                        document.querySelector('#message').textContent = '';
                    }, 3000);
                } else {
                    // Get the selected option
                    const selectedOption = document.getElementById('filePath').selectedOptions[0];
                    const selectedFilePath = selectedOption.value;

                    if (selectedFilePath) {

                        // Create new file with the selected file path
                        await octokit.request('PUT /repos/{owner}/{repo}/contents/{path}', {
                            owner,
                            repo: repoName,
                            path: selectedFilePath,
                            message,
                            committer,
                            content,
                            headers: {
                                'X-GitHub-Api-Version': '2022-11-28'
                            }
                        });
                        showMessageBox('New file created successfully!');
                    } else {
                        alert('Please select a file path.');
                    }
                }
            } catch (error) {
                console.error(error);
            }
        }

        document.getElementById('update').addEventListener('click', updateOrCreateContent);

        const autoSave = () => {
            const filePath = document.getElementById('filePath').value.trim();
            const content = document.getElementById('content').value;

            //if the first line is not 'editing', insert 'editing\n' as first line of the file, and then
            // commit the file to the repository
            // else, directly commit the file to the repository
            if (content.split('\n')[0] !== 'editing') {
                document.getElementById('content').value = 'editing\n' + content;
                updateOrCreateContent();
            } else {
                updateOrCreateContent();
            }

        };

        // Autosave every 5 seconds if 
        // 1) the repository name is not empty
        // 2) the file path is not empty
        // 3) the content is not empty
        // 4) the content is changed

        function handleContentChange() {
            contentChanged = true;
            clearTimeout(autosaveTimer);

            autosaveTimer = setTimeout(autoSave, 5000);

        }

        await document.getElementById('content').addEventListener('input', handleContentChange)






    </script>
</body>

</html>
