<h2>
路上的月亮
</h2>
<p>
</p>
<pre>1

月亮陪着我走回家。
我想把她带到将来的日子里去。
一路静悄悄……

2

咪、咪、咪……
请你不要把我打搅。
你是人吗？
也许你比人还可靠。

3

当然了，
没有比做人更值得骄傲。
而你呢？
你是猫。
猫生下来就是贸。

4

我想把她带到将来的日子里去！
不论怎样，
想想总比不想好。

5

生活真是这样美好。
睡觉！

6

月亮独自在荒野上飘。
她是什么时候失掉的，
我一点儿也不知道。
</pre>
