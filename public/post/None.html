    <p><h1>摸鱼儿</h1>
<h2>宋・李演</h2>
<p>又西风、四桥疏柳，惊蝉相对秋语。 <br />
琼荷万笠花云重，袅袅红衣如舞。<br />
鸿北去<br />
渺岸芷汀芳，几点斜阳字。<br />
吴亭旧树。<br />
又系我扁舟，渔乡钓里，秋色淡归鹭。<br />
长干路。<br />
草莽疏烟断墅。<br />
商歌如写羁旅。<br />
丹溪翠岫登临事，苔屐尚黏苍土。<br />
鸥且住。<br />
怕月冷吟魂，婉冉空江暮。<br />
明灯暗浦。<br />
更短笛衔风，长云弄晚，天际画秋句。</p></p>
