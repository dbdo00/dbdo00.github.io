<h1 class="title">git 里 file object 的使用</h1>
</header>


<ul>
<li><pre><code>git hash-object -w &lt;FILENAME&gt;</code></pre></li>
<li><p>会打印文件Object id。这个 id 不会因为该文件名改变而改变</p></li>
<li><p>用 object id 来看log</p>
<ul>
<li><code>git log --find-object=&lt;object id&gt;</code></li>
</ul></li>
<li><p>参考：<code>git log --help</code>, <a
href="https://git-scm.com/book/en/v2/Git-Internals-Git-Objects">Git-Internals-Git-Object</a></p></li>
</ul>
