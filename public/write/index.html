<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Content Updater</title>
    <script src="https://unpkg.com/netlify-auth-providers"></script>
</head>

<body>
    <h1>GitHub Content Updater</h1>
    <button id='loginButton'>Login to GitHub</button>
    <div id="repoExplorer" style="display: none;">
        <h2>Repository Explorer</h2>
        <label for="repoName">Repository Name:</label>
        <input type="text" id="repoName" placeholder="Enter repository name">
        <button id="repocontentbutton">Explore Repository</button>
        <div id="fileExplorer" style="display: none;">
            <h3>Repository Contents</h3>
            <select id="filePath">
                <option value="">Create New File</option>
                <!-- File paths will be populated dynamically -->
            </select>
        </div>
        <div>
            <label for="content">Content:</label>
            <textarea id="content" rows="5" cols="50" placeholder="Enter content"></textarea>
        </div>
        <div id="message"></div>
        <button id="update">Update/Create Content</button>
    </div>
    <script src="./index.js" type="module"></script>

</body>

</html>
