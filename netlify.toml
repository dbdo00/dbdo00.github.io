[dev] 
publish  = "public/"

[functions]
 external_node_modules = ["express"]
  node_bundler = "esbuild"
  directory = "functions"
 included_files = ["public/static/*"]

[[redirects]]
  force = true
  from = "/api/*"
  status = 200
  to = "/.netlify/functions/api/:splat"

[[redirects]]
 force = true
 from = "/f/*"
 status = 200
 to = "/.netlify/functions/:splat"

